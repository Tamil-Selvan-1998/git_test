<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Website Title -->
    <title>Aven</title> 
    <!-- Meta Tags -->
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- Custom-style-link -->
    <link href="css/style.css"  rel="stylesheet" >

</head>

<body>

    <!-- app-header -->
    <header class="top-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-6">
                    <div class="top-header-time">
                        <p>
                            16:21
                        </p>
                    </div>
                </div>
                <div class="col-6">
                    <div class="top-header-right">
                        <ul class="d-flex align-items-center justify-content-end">
                            <li>
                                <img src="images/signal.svg" alt="signal" title="signal" >
                            </li>
                            <li>
                                <img src="images/wifi.svg" alt="wifi" title="wifi" >
                            </li>
                            <li>
                                <img src="images/battery.svg" alt="battery" title="battery" >
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- app-body -->
    <main>
        <section class="login-header d-flex align-items-center">
            <div class="container">
                <div class="row justify-content-center text-center">
                    <div class="col-12">
                        <div class="logo">
                            <img src="images/aven-logo.svg" alt="aven-logo" title="aven-logo" >
                        </div>
                        <div class="welcome-title">
                            <h5>
                                Hi there!
                            </h5>
                            <h2>
                                Welcome Back Tamil
                            </h2>
                            <p>
                                Excepteur sint occaecat cupidatat non proident, sunt in culpa qui  occaecat cupidatat.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        

        <section class="login-form">
            <div class="container">
                <div class="row">
                    <div class="col-12 p-0">
                        <div class="login-title">
                            <h3>
                                Login
                            </h3>
                        </div>

                        <div class="login-form-outer">
                            <form>
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="floatingInput" placeholder="Name">
                                    <label for="floatingInput">Enter Name</label>
                                    <img src="images/mdi_user.svg" width="24px" height="24px" alt="user" title="user" >
                                </div>
                                <div class="form-floating">
                                    <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                                    <label for="floatingPassword">Password</label>
                                    <img src="images/eye.svg" width="20px" height="24px" alt="eye" title="eye" >
                                </div>

                                <div class="form-floating forgot-password-div">
                                    <p>
                                        Forgot Password
                                    </p>
                                </div>

                                <button class="btn btn-primary" type="submit">Login</button>
                            </form>
                        </div>

                        <div class="or-div">
                            <p>
                                or
                            </p>
                        </div>

                        <div class="other-signup">
                            <a class="other-signup-button" href="#!">
                                <img src="images/devicon_google.svg" title="google" alt="google">
                                Continue with Google
                            </a>
                            <a class="other-signup-button" href="#!">
                                <img src="images/devicon_apple.svg" title="Apple" alt="Apple">
                                Continue with Apple ID
                            </a>
                        </div>
                        
                    </div>
                </div>
            </div>
        </section>
    </main>


    <!-- app-footer -->
    <footer class="login-footer">
        <div class="main-menu-bar"></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>


</body>

</html>
